<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>masonry-pretext visual: pretextify</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!--
    Discriminating fixture for `pretextify` (#009). Items are default 60×30
    in the DOM but the callback returns variable heights — item 0 gets
    outerHeight: 60. If the callback is consulted, item 3 lands at col 1
    (col 0 is full at 60, cols 1/2 are tied shortest at 30 → picks leftmost).
    If `item.getSize()` runs instead, item 3 lands at col 0 (all cols tied
    at the DOM 30). The position assertion in run.mjs catches the regression.
  -->
  <div id="pretext" class="container">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
  </div>

  <script src="../../../dist/masonry.pkgd.min.js"></script>
  <script>
    var pretextSizes = [
      { outerWidth: 60, outerHeight: 60 }, // taller than DOM — the discriminator
      { outerWidth: 60, outerHeight: 30 },
      { outerWidth: 60, outerHeight: 30 },
      { outerWidth: 60, outerHeight: 30 },
    ];

    var grid = document.querySelector('#pretext');
    var items = grid.querySelectorAll('.item');

    window.__MSNRY = new Masonry(grid, {
      columnWidth: 60,
      transitionDuration: 0,
      pretextify: function (elem) {
        return pretextSizes[Array.prototype.indexOf.call(items, elem)];
      },
    });
    window.__READY = true;
  </script>

</body>
</html>
