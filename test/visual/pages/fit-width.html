<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>masonry-pretext visual: fit-width</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    #fit-width-wrap {
      width: 160px;
      background: #CCC;
    }
    #fit-width-wrap .container {
      margin: 0 auto;
      width: auto;
    }
  </style>
</head>
<body>

  <div id="fit-width-wrap">
    <div id="fit-width" class="container">
      <div class="item"></div>
      <div class="item h2"></div>
      <div class="item h3"></div>
    </div>
  </div>

  <script src="../../../dist/masonry.pkgd.min.js"></script>
  <script>
    window.__MSNRY = new Masonry('#fit-width', {
      columnWidth: 60,
      fitWidth: true,
      transitionDuration: 0,
    });
    window.__READY = true;
  </script>

</body>
</html>
