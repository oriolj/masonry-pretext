<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>masonry-pretext visual: measureFromAttributes (#043 / D.7)</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    /* Items are absolutely-positioned containers with a sentinel
       height of 1px. The <img> child is also 1px because the SVG
       data URL has no natural intrinsic dimensions. WITHOUT
       measureFromAttributes the items have height 1; WITH it,
       masonry reads the img width/height attrs and overrides
       the item height to columnWidth * (h/w). */
    #measure-from-attributes .item {
      width: 60px;
      height: 1px;
      padding: 0;
      border: none;
      overflow: hidden;
    }
    /* Hide the img visually so DOM measurement can't see its
       reserved aspect-ratio box. The browser may still reserve
       space natively via the width/height attributes — by
       hiding the img we force masonry to use the attribute
       hint, not the rendered box. */
    #measure-from-attributes img { display: none; }
  </style>
</head>
<body>

  <!--
    Discriminating fixture for measureFromAttributes (#043 / D.7).
    4 items each with a hidden 1×1 SVG <img> that has width/height
    attributes declaring different aspect ratios:
       - item 0: img w=60 h=90  → outerHeight = 60 * (90/60) = 90
       - item 1: img w=60 h=30  → outerHeight = 60 * (30/60) = 30
       - item 2: img w=60 h=30  → outerHeight = 30
       - item 3: img w=60 h=90  → outerHeight = 90

    Layout for cw=60, 3 cols, items [tall, short, short, tall]:
       item 0: (0,   0),  colYs = [90, 0,  0]
       item 1: (60,  0),  colYs = [90, 30, 0]
       item 2: (120, 0),  colYs = [90, 30, 30]
       item 3: (60, 30),  colYs = [90, 120, 30]

    The discriminator: item 3 lands at (60, 30) only if
    measureFromAttributes is wired correctly. Without it, every item
    has height 1 (from the CSS), the layout collapses, and item 3
    lands somewhere else.

    SVG data URL is 1×1 transparent so the browser has nothing to
    actually fetch and can't lazy-load anything that would change
    the size mid-layout.
  -->
  <div id="measure-from-attributes" class="container">
    <div class="item">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" width="60" height="90" alt="">
    </div>
    <div class="item">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" width="60" height="30" alt="">
    </div>
    <div class="item">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" width="60" height="30" alt="">
    </div>
    <div class="item">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" width="60" height="90" alt="">
    </div>
  </div>

  <script src="../../../dist/masonry.pkgd.min.js"></script>
  <script>
    var grid = document.querySelector('#measure-from-attributes');

    window.__MSNRY = new Masonry(grid, {
      columnWidth: 60,
      transitionDuration: 0,
      measureFromAttributes: true,
    });

    window.__READY = true;
  </script>

</body>
</html>
