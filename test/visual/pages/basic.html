<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>masonry-pretext visual: basic top-left</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div id="basic-layout-top-left" class="container">
    <div class="item"></div>
    <div class="item h4"></div>
    <div class="item h3"></div>
    <div class="item h3"></div>
    <div class="item w2"></div>
  </div>

  <script src="../../../dist/masonry.pkgd.min.js"></script>
  <script>
    window.__MSNRY = new Masonry('#basic-layout-top-left', {
      columnWidth: 60,
      transitionDuration: 0,
    });
    window.__READY = true;
  </script>

</body>
</html>
